<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Help your Friends get back on Instagram</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }

    /* Gradient button */
    .btn-next {
      background: linear-gradient(90deg, #405DE6, #5851DB, #833AB4, #C13584, #E1306C, #FD1D1D);
      background-size: 200% 200%;
      animation: gradientShift 4s ease infinite;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-purple-100 via-pink-50 to-blue-100 flex items-center justify-center p-4 sm:p-8">

  <!-- Main Container -->
  <div class="w-full max-w-lg bg-white rounded-3xl shadow-xl p-8 sm:p-10 border border-gray-100">
    
    <!-- Hero illustration -->
    <div class="flex justify-center pb-4">
      <svg width="130" height="110" viewBox="0 0 130 110" fill="none">
        <!-- Left face -->
        <circle cx="42" cy="58" r="28" fill="white" stroke="#DBDBDB" stroke-width="2"/>
        <!-- Left eyes -->
        <circle cx="35" cy="52" r="3" fill="#262626"/>
        <circle cx="49" cy="52" r="3" fill="#262626"/>
        <!-- Left smile -->
        <path d="M34 64 Q42 72 50 64" stroke="#262626" stroke-width="2" stroke-linecap="round" fill="none"/>

        <!-- Right face -->
        <circle cx="88" cy="58" r="28" fill="white" stroke="#DBDBDB" stroke-width="2"/>
        <!-- Right eyes -->
        <circle cx="81" cy="52" r="3" fill="#262626"/>
        <circle cx="95" cy="52" r="3" fill="#262626"/>
        <!-- Right smile -->
        <path d="M80 64 Q88 72 96 64" stroke="#262626" stroke-width="2" stroke-linecap="round" fill="none"/>

        <!-- Shield/checkmark badge (center overlap) -->
        <g transform="translate(52, 28)">
          <defs>
            <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#833AB4"/>
              <stop offset="50%" style="stop-color:#E1306C"/>
              <stop offset="100%" style="stop-color:#F77737"/>
            </linearGradient>
          </defs>
          <path d="M13 2 L24 6 L24 18 Q24 26 13 30 Q2 26 2 18 L2 6 Z" fill="url(#shieldGrad)"/>
          <!-- Checkmark -->
          <path d="M7 16 L11 21 L20 11" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </g>

        <!-- Sparkle lines around the shield -->
        <line x1="65" y1="10" x2="65" y2="4" stroke="#C13584" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="80" y1="14" x2="84" y2="10" stroke="#C13584" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="50" y1="14" x2="46" y2="10" stroke="#C13584" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="84" y1="30" x2="90" y2="30" stroke="#C13584" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="46" y1="30" x2="40" y2="30" stroke="#C13584" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>

    <!-- Title -->
    <div class="text-center mb-8">
      <h1 class="text-2xl sm:text-3xl font-bold text-gray-900 tracking-tight leading-tight">Help your Friends get back on Instagram</h1>
    </div>

    <!-- How this works section -->
    <div class="space-y-6">
      <h2 class="text-base font-bold text-gray-900 text-center tracking-wide uppercase">How this works</h2>

      <!-- Step 1 -->
      <div class="flex items-start gap-4">
        <div class="flex-shrink-0 w-10 h-10 flex items-center justify-center bg-purple-50 rounded-xl">
          <!-- Keyhole/Login Icon -->
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#262626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
            <polyline points="10 17 15 12 10 7" />
            <line x1="15" y1="12" x2="3" y2="12" />
          </svg>
        </div>
        <div class="pt-1">
          <p class="text-[14.5px] font-medium text-gray-800 leading-snug">
            Login into your account here
          </p>
        </div>
      </div>

      <!-- Divider -->
      <div class="border-b border-gray-100"></div>

      <!-- Step 2 -->
      <div class="flex items-start gap-4">
        <div class="flex-shrink-0 w-10 h-10 flex items-center justify-center bg-pink-50 rounded-xl">
          <!-- User Selector Icon -->
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#262626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>
        </div>
        <div class="pt-1">
          <p class="text-[14.5px] font-medium text-gray-800 leading-snug">
            Select the friends who need help getting back on their account
          </p>
        </div>
      </div>

      <!-- Divider -->
      <div class="border-b border-gray-100"></div>

      <!-- Step 3 -->
      <div class="flex items-start gap-4">
        <div class="flex-shrink-0 w-10 h-10 flex items-center justify-center bg-blue-50 rounded-xl">
          <!-- Message Code Icon -->
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#262626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
            <path d="M8 10h.01M12 10h.01M16 10h.01" />
          </svg>
        </div>
        <div class="pt-1">
          <p class="text-[14.5px] font-medium text-gray-800 leading-snug">
            Get the code to help them login and send it to them via text or WhatsApp
          </p>
        </div>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="mt-10 space-y-3">
      <button class="btn-next w-full py-4 rounded-xl text-white font-semibold text-[15px] tracking-wide shadow-md transition transform active:scale-95">
        Next
      </button>
      <button class="w-full py-3 text-[#0095F6] font-semibold text-[15px] hover:underline block text-center">
        Try another way
      </button>
    </div>

  </div>

</body>
</html>
